name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.7.4)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Create local.properties
        run: |
          cat > local.properties <<EOF
          signing.storePassword=${{ secrets.STORE_PASSWORD }}
          signing.keyAlias=${{ secrets.KEY_ALIAS }}
          signing.keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk output/NTQQBattery-${VERSION}.apk
          cp app/build/outputs/apk/debug/app-debug.apk output/NTQQBattery-${VERSION}-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: NTQQBattery ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
