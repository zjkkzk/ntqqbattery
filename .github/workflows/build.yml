name: Build APK

on:
  push:
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create local.properties
        run: |
          cat > local.properties <<EOF
          signing.storePassword=${{ secrets.STORE_PASSWORD }}
          signing.keyAlias=${{ secrets.KEY_ALIAS }}
          signing.keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Rename APKs
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/NTQQBattery-${VERSION}-debug.apk 2>/dev/null || true
          cp app/build/outputs/apk/release/app-release.apk output/NTQQBattery-${VERSION}.apk 2>/dev/null || true

      - name: Upload APKs
        uses: actions/upload-artifact@v6
        with:
          name: NTQQBattery
          path: output/*.apk
